<!DOCTYPE html>
<html>
<head>
  <title>AI LLM CI/CD Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f4f6f9;
    }

    header {
      background: #1e293b;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 24px;
    }

    .search-bar {
      padding: 15px;
      text-align: center;
    }

    input {
      padding: 10px;
      width: 60%;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .status-success {
      color: green;
      font-weight: bold;
    }

    .status-fail {
      color: red;
      font-weight: bold;
    }

    .loading {
      text-align: center;
      font-size: 18px;
      padding: 20px;
    }
  </style>
</head>

<body>

<header>🚀 AI LLM CI/CD Dashboard</header>

<div class="search-bar">
  <input type="text" id="search" placeholder="Search project..." onkeyup="filterData()">
</div>

<div id="loading" class="loading">Loading project data...</div>

<div id="app" class="container"></div>

<script>
  let projects = [];

  async function loadData() {
    try {
      const res = await fetch("https://your-backend-url.onrender.com/status");
      const data = await res.json();

      projects = data;

      document.getElementById("loading").style.display = "none";
      render(projects);
    } catch (err) {
      document.getElementById("loading").innerText = "❌ Failed to load backend data";
    }
  }

  function render(data) {
    const app = document.getElementById("app");
    app.innerHTML = "";

    data.forEach(item => {
      const buildClass = item.build === "Success" ? "status-success" : "status-fail";

      app.innerHTML += `
        <div class="card">
          <h2>${item.project}</h2>
          <p>🚀 Deployment: <span class="${buildClass}">${item.status}</span></p>
          <p>⚙️ Build: <span class="${buildClass}">${item.build}</span></p>
          <p>🤖 AI Review:</p>
          <p>${item.ai_review}</p>
        </div>
      `;
    });
  }

  function filterData() {
    const value = document.getElementById("search").value.toLowerCase();

    const filtered = projects.filter(p =>
      p.project.toLowerCase().includes(value)
    );

    render(filtered);
  }

  loadData();
</script>

</body>
</html>
