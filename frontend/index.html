<!DOCTYPE html>
<html>
<head>
  <title>AI LLM CI/CD Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f4f6f9;
    }

    header {
      background: #1e293b;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 24px;
    }

    .search-bar {
      padding: 15px;
      text-align: center;
    }

    input {
      padding: 10px;
      width: 60%;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .status-success {
      color: green;
      font-weight: bold;
    }

    .status-fail {
      color: red;
      font-weight: bold;
    }

    .loading {
      text-align: center;
      font-size: 18px;
      padding: 20px;
    }
  </style>
</head>

<body>

<header>🚀 AI LLM CI/CD Dashboard</header>

<div class="search-bar">
  <input type="text" id="search" placeholder="Search project..." onkeyup="filterData()">
</div>

<div id="loading" class="loading">Loading project data...</div>

<div id="app" class="container"></div>

<!-- ✅ LINK JS FILE -->
<script src="app.js"></script>

</body>
</html>
